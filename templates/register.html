{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Регистрация</h2>
  <form method="post" class="auth-form">
    <label>Логин
      <input type="text" name="username" required />
    </label>
    <label>Пароль
      <input type="password" name="password" required />
    </label>
    <label>Код администратора (необязательно)
      <input type="password" name="admin_key" placeholder="Только для админ-прав" />
    </label>
    <button type="submit">Создать аккаунт</button>
  </form>
  <p>Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
</div>
{% endblock %}
